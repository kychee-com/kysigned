name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24: @run402/sdk needs >=22 (EBADENGINE on 20), and Node 20 actions
          # runners are deprecated.
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:all
      - name: Documentation coverage (non-blocking until llms.txt exists)
        run: npm run test:docs
        continue-on-error: true
