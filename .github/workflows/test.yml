name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24: @run402/sdk needs >=22 (EBADENGINE on 20), and Node 20 actions
          # runners are deprecated.
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      # Real type-check. Tests execute via tsx (no type-checking), so without
      # this step a breaking devDep bump (e.g. typescript 6 vs @types/node 22)
      # sails through CI green.
      - run: npm run build
      - run: npm run test:all
      # Blocking since 44.8: llms.txt + openapi.json exist and are drift-tested —
      # an undocumented endpoint or a docs lie fails CI.
      - name: Documentation coverage
        run: npm run test:docs
