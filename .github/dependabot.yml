# Dependabot — keep npm dependencies current so the community-maintained
# `disposable-email-domains` blocklist (F-13.6c / AC-95) and other packages don't
# silently rot. That list is a normal npm dependency that esbuild INLINES into the
# deploy bundle at build time, so it only refreshes when the version is bumped and
# the project is redeployed. Dependabot opens the bump PRs; CI (.github/workflows/
# test.yml) gates them; merging one and running scripts/deploy.ts is what ships the
# refreshed list to production.
#
# Minor/patch bumps are grouped into one low-noise PR per directory. Majors come as
# their own PRs so a breaking change is reviewed on its own.
#
# cooldown.default-days: 7 — never offer a release younger than a week. This is
# the supply-chain guard: hijacked-maintainer / worm-published versions (the 2025
# npm ecosystem attacks) are typically yanked within days of publish; a 7-day
# floor means Dependabot only proposes versions the ecosystem has already had a
# chance to vet. Deliberately NOT applied to Dependabot SECURITY updates — those
# ignore cooldown by design, so a patch for a disclosed CVE still arrives
# immediately.
#
# Suppressed majors (2026-07-21, from the review of PRs #2/#3/#7/#8/#12/#13/#14):
# - typescript: taken as ONE deliberate repo-wide migration (root + mcp + frontend
#   on the same TS line), never per-directory drift. Currently hard-blocked at
#   root: pkijs's ICryptoEngine lags TS 6/7's WebCrypto lib types (PR #3). Remove
#   these rules when issue #21 lands the coordinated upgrade.
# - "@types/node": types track the Node that actually RUNS the code (root: Lambda
#   nodejs22.x; mcp: engines >=20 npx floor; frontend: Node 24 CI toolchain). The
#   pin moves manually, together with the runtime, never ahead of it.
# - zod (mcp only): @x402/* still pin zod ^3, so zod 4 now means a dual-major
#   tree without retiring v3. Remove when x402 moves to zod 4.
#
# rebase-strategy disabled (2026-07-21): dependabot used to force-rebase every
# open PR on every push to main, emailing subscribers "pushed 1 commit" each
# time. Trade-off: an open PR's checks can go stale; comment "@dependabot
# rebase" on the PR to refresh it before merging.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    rebase-strategy: "disabled"
    cooldown:
      default-days: 7
    groups:
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
